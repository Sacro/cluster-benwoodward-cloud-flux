---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: readarr
  namespace: media
spec:
  chart:
    spec:
      chart: readarr
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: readarr
      version: 25.x.x
  interval: 1m0s
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/readarr/values.yaml
  # https://github.com/trueforge-org/truecharts/blob/master/charts/library/common/values.yaml
  values:
    image:
      repository: ghcr.io/faustvii/readarr
      tag: 0.9.1@sha256:9150fb3b833fef79224f75e950b691dde93779b013040fffb9146f9ca018e5da
    persistence:
      config:
        size: 1Gi
      data:
        enabled: true
        type: nfs
        server: 192.168.5.250
        path: /volume1/NFS
        mountPath: /nfs
    podOptions:
      affinity:
        podAffinity: false
