---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: slskd
  namespace: media
spec:
  chart:
    spec:
      chart: slskd
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: slskd
      version: 5.x.x
  interval: 1m0s
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/slskd/values.yaml
  # https://github.com/trueforge-org/truecharts/blob/master/charts/library/common/values.yaml
  values:
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                SLSKD_REMOTE_CONFIGURATION: true
    persistence:
      data:
        size: 10Gi
      share:
        size: 10Gi
      incomplete:
        size: 10Gi
      complete:
        size: 10Gi
    podOptions:
      affinity:
        podAffinity: false
      nodeSelector:
        kubernetes.io/arch: arm64
