apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: threadfin
  namespace: media
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: gateway
  hostnames:
    - threadfin.benwoodward.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: threadfin
          port: 34400
