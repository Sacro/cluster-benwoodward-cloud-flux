apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
spec:
  interval: 5m
  chart:
    spec:
      chart: descheduler
      version: 0.x.x
      sourceRef:
        kind: HelmRepository
        name: descheduler
      interval: 60m
  # https://github.com/kubernetes-sigs/descheduler/blob/master/charts/descheduler/values.yaml
  values:
    kind: Deployment
    leaderElection:
      enabled: true
    replicas: 3
