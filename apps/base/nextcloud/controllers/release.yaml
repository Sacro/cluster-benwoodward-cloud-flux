---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  chart:
    spec:
      chart: nextcloud
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: nextcloud
      version: 9.x.x
  interval: 1m0s
  # https://github.com/nextcloud/helm/blob/main/charts/nextcloud/README.md
  values:
    externalDatabase:
      enabled: true
      type: postgresql
      existingSecret:
        enabled: true
        secretName: pg-cluster-app
        usernameKey: username
        passwordKey: password
        hostKey: host
        databaseKey: dbname
    internalDatabase:
      enabled: false
    nextcloud:
      host: nextcloud.benwoodward.cloud
    persistance:
      enabled: true
      size: 8Gi
      nextcloudData:
        enabled: true
        size: 8Gi
