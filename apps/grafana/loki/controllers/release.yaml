---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
spec:
  chart:
    spec:
      chart: loki
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: loki
      version: 7.x
  interval: 1m0s
  # https://github.com/grafana-community/helm-charts/blob/main/charts/loki/values.yaml
  values:
    global:
      dnsService: coredns
    loki:
      limits_config:
        volume_enabled: true
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      ingester:
        chunk_encoding: snappy
      tracing:
        enabled: true
      querier:
        # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
        max_concurrent: 4

    #gateway:
    #  ingress:
    #    enabled: true
    #    hosts:
    #      - host: FIXME
    #        paths:
    #          - path: /
    #            pathType: Prefix

    deploymentMode: SimpleScalable

    backend:
      nodeSelector:
        kubernetes.io/arch: arm64
      replicas: 3
      persistence:
        storageClass: longhorn-no-replicate
    read:
      nodeSelector:
        kubernetes.io/arch: arm64
      replicas: 3
      persistence:
        storageClass: longhorn-no-replicate
    write:
      nodeSelector:
        kubernetes.io/arch: arm64
      replicas: 3
      persistence:
        storageClass: longhorn-no-replicate

    # Enable minio for storage
    minio:
      enabled: true

    # Zero out replica counts of other deployment modes
    singleBinary:
      replicas: 0

    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0

    # https://docs.siderolabs.com/talos/v1.6/learn-more/knowledge-base#logging-kubernetes-audit-logs-with-loki
    promtail:
      extraArgs:
        - -config.expand-env
      # this is required so that the promtail process can read the kube-apiserver audit logs written as `nobody` user
      containerSecurityContext:
        capabilities:
          add:
            - DAC_READ_SEARCH
      extraVolumes:
        - name: audit-logs
          hostPath:
            path: /var/log/audit/kube
      extraVolumeMounts:
        - name: audit-logs
          mountPath: /var/log/audit/kube
          readOnly: true
      config:
        snippets:
          extraScrapeConfigs: |
            - job_name: auditlogs
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: auditlogs
                    host: ${HOSTNAME}
                    __path__: /var/log/audit/kube/*.log
