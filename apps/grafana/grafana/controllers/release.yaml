---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  chart:
    spec:
      chart: grafana
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: grafana-community
      version: 12.x.x
  interval: 1m0s
  # https://github.com/grafana-community/helm-charts/blob/main/charts/grafana/values.yaml
  values:
    persistence:
      enabled: true
    route:
      main:
        enabled: true
        hostnames:
          - grafana.benwoodward.cloud
        parentRefs:
          - name: cilium-gateway
            namespace: gateway
